name: Job Alert

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # manual run button in GitHub UI

# Kill a hung run when the next one starts, instead of letting it agonize
# for ~hours when LinkedIn rate-limits the scraper.
concurrency:
  group: job-alert
  cancel-in-progress: true

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 25       # healthy run = a few minutes; 25 = hard stop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen_jobs DB
        uses: actions/cache@v4
        with:
          path: seen_jobs.db
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Restore bot state (pause/resume)
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.run_id }}
          restore-keys: bot-state-

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
        run: python main.py

      - name: Save seen_jobs DB
        uses: actions/cache@v4
        with:
          path: seen_jobs.db
          key: seen-jobs-${{ github.run_id }}

      - name: Save bot state
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.run_id }}
